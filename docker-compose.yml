services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: eastbridge
      POSTGRES_PASSWORD: eastbridge
      POSTGRES_DB: eastbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eastbridge -d eastbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://eastbridge:eastbridge@db:5432/eastbridge
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  worker:
    build: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://eastbridge:eastbridge@db:5432/eastbridge
      POSTGRES_HOST: db
    depends_on:
      backend:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://eastbridge:eastbridge@db:5432/eastbridge
      POSTGRES_HOST: db
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api/v1
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
